<nav class="nav-menu">
  <!-- Hamburger button — only visible on mobile -->
  <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="nav-list" [class.is-open]="menuOpen">
    <li class="nav-item">
      <a class="nav-link" routerLink="/" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <i class="fas fa-home"></i> {{ "HOME" | translate }}
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">
        <i class="fas fa-code"></i> {{ "PROJECTS" | translate }}
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="/education" routerLinkActive="active" (click)="closeMenu()">
        <i class="fas fa-graduation-cap"></i> {{ "EDUCATION" | translate }}
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="/experience" routerLinkActive="active" (click)="closeMenu()">
        <i class="fas fa-briefcase"></i> {{ "EXPERIENCE" | translate }}
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">
        <i class="fas fa-envelope"></i> {{ "CONTACT" | translate }}
      </a>
    </li>
    <li class="nav-item dropdown">
      <a class="nav-link dropdown-toggle" href="#"
         id="navbarDropdown" role="button"
         data-bs-toggle="dropdown" aria-expanded="false">
        <i class="fas fa-globe"></i> {{ "LANGUAGE" | translate }}
      </a>
      <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
        <li><a class="dropdown-item" (click)="onChangeLanguage('en')">🇬🇧 English</a></li>
        <li><a class="dropdown-item" (click)="onChangeLanguage('fr')">🇫🇷 Français</a></li>
      </ul>
    </li>
  </ul>
